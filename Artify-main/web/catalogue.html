<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogue - Artify</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@400;500;600;700;800&family=Abril+Fatface&family=Beau+Rivage&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Cinzel:wght@400..900&family=Climate+Crisis&family=Ephesis&family=Monsieur+La+Doulaise&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Smooch+Sans:wght@100..900&family=Titan+One&display=swap" rel="stylesheet">

    <!-- Main CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About Us</a>
        <a href="catalogue.html">Catalogue</a>
        <a href="cart.html">Cart</a>
        <a href="checkout.html">Checkout</a>
    </nav>
    <hr class="header-line">
</header>

<main class="container">

    <h1 class="catalogue-title">Art Catalogue</h1>

    <div id="catalogue" class="catalogue">
        <!-- Art items injected by JavaScript -->
    </div>

</main>

<footer>
    <p class="footer-text">&copy; 2026 Artify. All rights reserved.</p>
</footer>

<!-- Art data (single source of truth) -->
<script src="js/art-data.js"></script>

<!-- Catalogue logic -->
<script>
    const catalogue = document.getElementById("catalogue");

    artworks.forEach(art => {
        const item = document.createElement("div");
        item.className = "art-item";

        // Clicking the card opens the artwork detail page
        item.onclick = () => {
            window.location.href = `art.html?id=${art.id}`;
        };

        item.innerHTML = `
            <img src="${art.image}" alt="${art.title}">
            <div class="art-info">
                <h3>${art.title}</h3>
                <p>${art.artist}</p>
                <p class="price">$${art.price}</p>
            </div>
        `;

        catalogue.appendChild(item);
    });
</script>

</body>
</html>
